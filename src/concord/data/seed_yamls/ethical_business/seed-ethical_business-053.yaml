id: seed-ethical_business-053
domain: ethical_business
culture: US
max_turns: 8
buyer_context:
  batna: 20000
  reserve_price: 28000
  hard_constraints:
  - all_suppliers_must_maintain_bcorp_certification
  - all_substitutions_require_written_ngo_partner_approval
  private_info:
  - ngo_partner_typically_responds_in_5_days
  - production_line_stops_in_4_weeks_without_materials
  walk_away_threshold: 0.5
  reputation: null
  relationship_history: []
seller_context:
  batna: 14000
  reserve_price: 17000
  hard_constraints:
  - minimum_order_1000_units
  private_info:
  - uncertified_competitor_can_deliver_in_2_weeks
