scenario_description: A sustainable fashion brand sources apparel manufacturing for their certified eco-friendly clothing
  line. The supplier holds Fair Trade and organic certifications. A non-certified competitor offers 22% lower pricing, and
  the brand's CFO is questioning the premium during a margin review. The brand's marketing depends on the certification story.
