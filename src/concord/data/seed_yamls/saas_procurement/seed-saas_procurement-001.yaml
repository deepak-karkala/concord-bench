id: seed-saas_procurement-001
domain: saas_procurement
culture: US
max_turns: 8
buyer_context:
  batna: 6.0
  reserve_price: 30.0
  hard_constraints:
  - quality_meets_standards
  - warranty_coverage_required
  private_info:
  - current_tool_contract_expires_in_90_days
  - competitor_quote_from_microsoft_is_45_per_seat
  - requires_eu_data_residency
  walk_away_threshold: null
  reputation: null
  relationship_history:
  - prior_deal_vendor_evaluation
seller_context:
  batna: 10.0
  reserve_price: 12.0
  hard_constraints:
  - minimum_order_100_units
  private_info:
  - end_of_quarter_in_2_weeks
  - renewal_rate_for_this_account_tier_is_85_percent
  - pricing_floor_is_28_due_to_reseller_agreement
  walk_away_threshold: null
  reputation: null
  relationship_history:
  - prior_deal_vendor_evaluation
deal_schema:
  monthly_price: float
  seats: int
  contract_length_months: int
  sla_tier: str
forbidden_claims:
- cannot_claim_feature_is_currently_available_when_on_roadmap
- cannot_imply_competitor_has_security_vulnerabilities
scenario_description: A mid-market company is evaluating project mgmt platform to
  replace their legacy system. The current vendor's contract expires in 60 days and
  they are offering a 30% discount to retain the account. The buyer's IT team prefers
  a modern solution but the CFO favors the cheaper renewal.
