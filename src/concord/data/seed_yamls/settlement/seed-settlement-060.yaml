  reserve_price: 120000
  hard_constraints:
  - no_admission_of_liability
  - tax_treatment_argument
  private_info:
  - defendant_offering_structured_payment_totaling_140000
  - structured_payment_npv_is_118000_below_board_threshold
  - legal_counsel_says_board_threshold_applies_to_nominal_not_npv
