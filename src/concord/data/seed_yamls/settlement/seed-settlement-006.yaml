id: seed-settlement-006
domain: settlement
culture: US
max_turns: 10
buyer_context:
  batna: 25000.0
  reserve_price: 37500.0
  hard_constraints:
  - mutual_release_of_all_claims
  - no_admission_of_liability
  private_info:
  - plaintiff_damages_estimate_is_150000_to_300000
  - expert_report_is_favorable_to_plaintiff
  - class_certification_hearing_in_60_days
  - lump_sum_preferred_valued_at_20_percent_premium
  - quick_payment_30_days_worth_10_percent_to_plaintiff
  - accept_structured_if_total_25_percent_above_lump_sum_equivalent
  walk_away_threshold: null
  reputation: null
  relationship_history: []
seller_context:
  batna: 10000.0
  reserve_price: 6000.0
  hard_constraints:
  - mutual_release_of_all_claims
  - no_public_statement_about_settlement
  private_info:
  - insurance_covers_up_to_120000
  - reputational_damage_estimated_at_80000
  - internal_legal_budget_exhausted_at_50000
  - structured_18_month_preferred_for_cash_flow_management
  - lump_sum_cost_is_12_percent_higher_due_to_borrowing
  - willing_to_add_10_percent_to_total_for_structure
  - 18_month_structure_saves_20_percent_in_effective_tax
  - accept_structured_if_total_15_percent_above_lump_sum
  - insurance_carrier_prefers_structured_payouts
  walk_away_threshold: null
  reputation: null
  relationship_history: []
deal_schema:
  settlement_amount: float
  payment_structure: str
  payment_timeline_days: int
  confidentiality_clause: bool
  non_disparagement: bool
forbidden_claims:
- cannot_claim_opposing_counsel_is_under_investigation
- cannot_claim_new_damages_evidence_was_discovered
scenario_description: A patent infringement dispute between two tech companies over display technology. The plaintiff alleges
  willful infringement of three patents covering manufacturing processes. The defendant acknowledges using similar processes
  but claims independent development. Both sides face 18-24 months of litigation, $2-4M in legal fees each, and the risk of
  an injunction shutting down the defendant's production line.
