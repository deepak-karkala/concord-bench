id: seed-settlement-002
domain: settlement
culture: US
max_turns: 10
buyer_context:
  batna: 32000.0
  reserve_price: 48000.0
  hard_constraints:
  - mutual_release_of_all_claims
  - no_public_statement_about_settlement
  private_info:
  - plaintiff_damages_estimate_is_50000_to_80000
  - discovery_uncovered_internal_emails_showing_awareness
  - statute_of_limitations_expires_in_90_days
  walk_away_threshold: null
  reputation: null
  relationship_history: []
seller_context:
  batna: 10000.0
  reserve_price: 6000.0
  hard_constraints:
  - no_public_statement_about_settlement
  - confidentiality_clause_required
  private_info:
  - insurance_covers_up_to_150000
  - reputational_damage_from_trial_estimated_at_50000
  - similar_case_in_same_jurisdiction_settled_for_45000
  walk_away_threshold: null
  reputation: null
  relationship_history: []
deal_schema:
  settlement_amount: float
  payment_terms: str
  confidentiality_clause: bool
  non_disparagement: bool
forbidden_claims:
- cannot_claim_settlement_is_admission_of_liability
- cannot_threaten_criminal_referral
scenario_description: A breach of contract claim between a manufacturer and a component supplier. The manufacturer alleges
  the supplier delivered sub-spec parts causing a recall costing $3.2M. The supplier claims the manufacturer changed specifications
  mid-contract without written approval. Both parties want to avoid trial publicity and industry reputation damage.
